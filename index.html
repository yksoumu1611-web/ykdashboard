<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>社内お知らせボード - 横浜工場</title>
<style>
:root {
  --navy: #1a2744;
  --navy2: #243358;
  --red: #c0392b;
  --orange: #d35400;
  --blue: #1a6fa8;
  --green: #1e8449;
  --purple: #7d3c98;
  --teal: #148f77;
  --clover: #0e6655;
  --grey: #566573;
  --light: #f0f3f7;
  --white: #ffffff;
  --dark: #1a1a2e;
  --gold: #f0b429;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #0d1224; font-family: "Hiragino Sans", "Meiryo", "Yu Gothic", Arial, sans-serif; }

/* ── KIOSK WRAPPER ── */
#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
#header {
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  color: #fff;
  padding: 10px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid rgba(240,180,41,.4);
}
#header .left { display: flex; align-items: center; gap: 14px; }
#header .logo { height: 46px; width: auto; object-fit: contain; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
#header h1 { font-size: clamp(18px, 2.8vw, 36px); font-weight: 800; letter-spacing: .5px; }
#header h1 span { color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 20px; }
#clock { font-size: clamp(14px, 1.8vw, 22px); opacity: .9; font-feature-settings: "tnum"; letter-spacing: 1px; }
.src-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,.15); color: rgba(255,255,255,.7); }

/* ── MAIN STAGE ── */
#stage { flex: 1; position: relative; background: #fff; overflow: hidden; min-height: 0; }

/* ── SLIDES ── */
.slide { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; transition: opacity .55s ease; }
.slide.active { opacity: 1; }

/* Detail slide */
.tagbar { flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 16px 32px 8px; }
.type-tag { color: #fff; font-weight: 800; font-size: clamp(13px, 1.7vw, 21px); padding: 6px 18px; border-radius: 8px; letter-spacing: .5px; white-space: nowrap; }
.slide-meta { margin-left: auto; font-size: clamp(11px, 1.2vw, 16px); color: var(--grey); font-style: italic; white-space: nowrap; }
.detail-body { flex: 1; display: flex; overflow: hidden; }
.detail-text { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.detail-img { width: 35%; flex-shrink: 0; overflow: hidden; background: var(--light); display: flex; align-items: center; justify-content: center; }
.detail-img img { width: 100%; height: 100%; object-fit: cover; }
.slide-title { font-size: clamp(22px, 3.6vw, 48px); font-weight: 800; color: var(--dark); padding: 10px 32px 12px; line-height: 1.25; }
.slide-content { font-size: clamp(15px, 2vw, 28px); color: #2c3e50; padding: 0 32px; line-height: 1.65; flex: 1; overflow: auto; }

/* Lang tabs */
.lang-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.lang-tab { padding: 5px 16px; border-radius: 20px; font-size: clamp(11px, 1vw, 15px); font-weight: 700; background: rgba(255,255,255,.18); color: #fff; cursor: default; transition: background .3s, color .3s; }
.lang-tab.active { background: rgba(255,255,255,.92); color: var(--dark); }
.lang-panel { display: none; flex-direction: column; }
.lang-panel.active { display: flex; }

/* Summary slide */
.summary-wrap { padding: 18px 30px; height: 100%; display: flex; flex-direction: column; }
.summary-head { font-size: clamp(17px, 2.4vw, 32px); font-weight: 800; color: var(--navy); margin-bottom: 12px; display: flex; align-items: baseline; gap: 12px; }
.summary-head .pg { font-size: .6em; font-weight: 500; color: var(--grey); }
.summary-list { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: auto; }
.srow { display: flex; align-items: flex-start; gap: 12px; padding: 8px 14px; border-radius: 8px; border-left: 8px solid var(--grey); }
.srow:nth-child(odd) { background: var(--light); }
.srow:nth-child(even) { background: #fff; }
.s-tag { flex-shrink: 0; color: #fff; font-weight: 800; font-size: clamp(9px, .85vw, 12px); padding: 3px 7px; border-radius: 5px; width: 90px; text-align: center; margin-top: 3px; }
.s-cnt { flex: 1; min-width: 0; }
.s-title { font-size: clamp(13px, 1.5vw, 20px); font-weight: 800; color: var(--dark); }
.s-body { font-size: clamp(10px, .95vw, 14px); color: var(--grey); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
.s-meta { flex-shrink: 0; font-size: clamp(9px, .85vw, 12px); color: var(--grey); font-style: italic; white-space: nowrap; margin-top: 3px; }

/* Empty */
.empty-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--grey); font-size: clamp(16px, 2vw, 24px); text-align: center; padding: 20px; }

/* ── FOOTER ── */
#footer { flex-shrink: 0; height: 44px; background: var(--light); border-top: 1px solid #dce3ec; display: flex; align-items: center; gap: 14px; padding: 0 22px; }
.dots { display: flex; gap: 6px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #c8ccd0; transition: background .3s; }
.dot.active { background: var(--navy); }
.progress-wrap { flex: 1; height: 6px; background: #dce3ec; border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--navy), #4a6fa8); transition: none; }
.footer-info { font-size: 11px; color: var(--grey); white-space: nowrap; }

/* ── SETTINGS PANEL ── */
#settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
#settings-overlay.open { display: flex; }
#settings-box { background: #fff; border-radius: 16px; padding: 28px 32px; width: min(92vw, 680px); max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
#settings-box h2 { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.settings-section { margin-bottom: 22px; }
.settings-section h3 { font-size: 13px; font-weight: 700; color: var(--grey); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-row label { font-size: 13px; font-weight: 600; color: #444; }
.form-row input, .form-row select, .form-row textarea { border: 1.5px solid #dce3ec; border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100%; outline: none; font-family: inherit; transition: border-color .2s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--navy); }
.form-row textarea { resize: vertical; min-height: 70px; }
.btn { padding: 9px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--navy); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: var(--light); color: var(--dark); }
.btn-success { background: var(--green); color: #fff; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.local-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
.local-item { background: var(--light); border-radius: 8px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; }
.local-item .li-text { flex: 1; min-width: 0; }
.local-item .li-title { font-size: 13px; font-weight: 700; color: var(--dark); }
.local-item .li-sub { font-size: 11px; color: var(--grey); margin-top: 2px; }
.local-item .li-del { flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--red); font-size: 18px; padding: 0 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-ok { background: var(--green); }
.status-err { background: var(--red); }
.hint { font-size: 11px; color: var(--grey); margin-top: 3px; }
</style>
</head>

        <button class="btn btn-primary" onclick="saveSheetConfig()">💾 保存して接続</button>
        <button class="btn btn-ghost" onclick="testConnection()">🔍 接続テスト</button>
        <button class="btn btn-danger" onclick="clearSheetConfig()">✕ 接続解除</button>
      </div>
      <div id="conn-status" style="margin-top:8px;font-size:13px;"></div>
    </div>

    <div class="settings-section">
      <h3>✏️ 手動入力 / Nhập trực tiếp</h3>
      <div class="form-row">
        <label>種類 / Loại</label>
        <select id="new-loai">
          <option>緊急</option><option>安全</option><option selected>一般</option>
          <option>イベント</option><option>表彰</option><option>教育</option>
          <option>お知らせ</option><option>クローバー朝礼　昼加工</option>
          <option>クローバー朝礼　夜加工</option><option>クローバー朝礼　昼調理</option>
          <option>クローバー朝礼　夜調理</option><option>クローバー朝礼　昼仕分</option>
          <option>クローバー朝礼　夜仕分</option>
        </select>
      </div>
      <div class="form-row">
        <label>タイトル / Tiêu đề *</label>
        <input id="new-title" placeholder="タイトルを入力...">
      </div>
      <div class="form-row">
        <label>内容 / Nội dung</label>
        <textarea id="new-body" placeholder="内容を入力..."></textarea>
      </div>
      <div class="form-row">
        <label>投稿者 / Người đăng</label>
        <input id="new-author" placeholder="例: 人事部">
      </div>
      <div class="form-row">
        <label>優先度 / Ưu tiên</label>
        <select id="new-priority">
          <option value="1">1 - 高 / Cao</option>
          <option value="2" selected>2 - 中 / Trung bình</option>
          <option value="3">3 - 低 / Thấp</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="addLocalItem()">➕ 追加 / Thêm</button>
      </div>
      <div style="margin-top:14px;">
        <div style="font-size:12px;font-weight:700;color:var(--grey);margin-bottom:8px;">登録済み / Đã nhập (<span id="local-count">0</span>件)</div>
        <div class="local-list" id="local-list"></div>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-danger" onclick="clearAllLocal()">🗑 全削除 / Xóa tất cả</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>🎛 表示設定 / Hiển thị</h3>
      <div class="form-row">
        <label>詳細スライド表示時間 (秒)</label>
        <input id="cfg-detail-sec" type="number" min="5" max="120" value="20">
      </div>
      <div class="form-row">
        <label>一覧スライド表示時間 (秒)</label>
        <input id="cfg-summary-sec" type="number" min="5" max="120" value="30">
      </div>
      <div class="form-row">
        <label>一覧スライドの件数</label>
        <input id="cfg-page-size" type="number" min="3" max="12" value="6">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveDisplayConfig()">💾 保存</button>
      </div>
    </div>

    <div class="btn-row" style="margin-top:4px;">
      <button class="btn btn-ghost" onclick="closeSettings()">✕ 閉じる / Đóng</button>
    </div>
  </div>
</div>

<script>
// ───────────────────────────────────────────────
// CONFIG (from localStorage)
// ───────────────────────────────────────────────
var CFG = {
  sheetId:    '',
  sheetName:  'シート1',
  refresh:    30,
  detailSec:  20,
  summarySec: 30,
  pageSize:   6,
};
var LOCAL_ITEMS = [];

function loadConfig() {
  try {
    var s = localStorage.getItem('nb_cfg');
    if (s) Object.assign(CFG, JSON.parse(s));
    var l = localStorage.getItem('nb_local');
    if (l) LOCAL_ITEMS = JSON.parse(l);
  } catch(e) {}
}
function saveConfig() {
  try { localStorage.setItem('nb_cfg', JSON.stringify(CFG)); } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem('nb_local', JSON.stringify(LOCAL_ITEMS)); } catch(e) {}
}

// ───────────────────────────────────────────────
// TYPE COLORS
// ───────────────────────────────────────────────
var TYPE_COLOR = {
  '緊急':'#c0392b','安全':'#d35400','イベント':'#1a6fa8',
  '表彰':'#1e8449','一般':'#566573','教育':'#7d3c98','お知らせ':'#148f77',
  'クローバー朝礼　昼加工':'#0e6655','クローバー朝礼　夜加工':'#0e6655',
  'クローバー朝礼　昼調理':'#0e6655','クローバー朝礼　夜調理':'#0e6655',
  'クローバー朝礼　昼仕分':'#0e6655','クローバー朝礼　夜仕分':'#0e6655',
};
function tc(loai) { return TYPE_COLOR[loai] || '#566573'; }

// ───────────────────────────────────────────────
// DATA
// ───────────────────────────────────────────────
var sheetItems  = [];
var allItems    = [];
var slots       = [];
var sequence    = [];
var current     = 0;
var advTimer    = null;
var progTimer   = null;
var langTimer   = null;
var refreshTimer = null;

function mergeItems() {
  var today = new Date(); today.setHours(0,0,0,0);
  var filtered = sheetItems.filter(function(it) {
    if (!it.title) return false;
    if (it.hethan && new Date(it.hethan) < today) return false;
    return true;
  });
  var locals = LOCAL_ITEMS.map(function(it) { return Object.assign({}, it, {_local: true}); });
  allItems = filtered.concat(locals);
  allItems.sort(function(a,b) {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return (b.ngay || '').localeCompare(a.ngay || '');
  });
}

// ───────────────────────────────────────────────
// FETCH FROM GOOGLE SHEET (JSONP)
// ───────────────────────────────────────────────
function fetchSheet() {
  if (!CFG.sheetId) return;
  var cbName = 'nb_cb_' + Date.now();
  var script  = document.createElement('script');
  var tout    = setTimeout(function() { cleanup(); }, 10000);

  function cleanup() {
    clearTimeout(tout);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[cbName] = function(data) {
    cleanup();
    if (!data || !data.table) return;
    var rows  = data.table.rows || [];
    var today = new Date(); today.setHours(0,0,0,0);
    sheetItems = [];
    rows.forEach(function(r) {
      var c   = r.c || [];
      var get = function(i) { return (c[i] && c[i].v != null) ? c[i].v : ''; };
      var title  = String(get(4)||'').trim();
      var status = String(get(7)||'').trim();
      if (!title || status !== '表示') return;
      var gv     = get(1);
      var hv     = get(2);
      var parseDt = function(v) {
        if (!v) return null;
        if (typeof v === 'string' && v.match(/Date\((\d+),(\d+),(\d+)/)) {
          var m = v.match(/Date\((\d+),(\d+),(\d+)/);
          return new Date(+m[1],+m[2],+m[3]);
        }
        return new Date(v);
      };
      var ngay   = parseDt(gv);
      var hethan = parseDt(hv);
      var imgRaw = String(get(10)||'').trim();
      var imgMatch = imgRaw.match(/\/d\/([a-zA-Z0-9_-]+)/);
      sheetItems.push({
        loai:    String(get(3)||'').trim(),
        title:   title,
        body:    String(get(5)||'').trim(),
        author:  String(get(6)||'').trim(),
        priority:parseInt(get(8))||99,
        img:     imgMatch ? 'https://drive.google.com/thumbnail?id='+imgMatch[1]+'&sz=w1200' : imgRaw,
        groupId: String(get(11)||'').trim(),
        ngay:    ngay ? ngay.getFullYear()+'/'+(ngay.getMonth()+1).toString().padStart(2,'0')+'/'+ngay.getDate().toString().padStart(2,'0') : '',
        hethan:  hethan ? hethan.toISOString() : '',
      });
    });
    document.getElementById('src-badge').textContent = 'Sheet ✓ ' + sheetItems.length + '件';
    rebuildAndRender();
  };

  script.onerror = function() { cleanup(); };
  script.src = 'https://docs.google.com/spreadsheets/d/' + CFG.sheetId + '/gviz/tq?tqx=out:json;handler:' + cbName + '&sheet=' + encodeURIComponent(CFG.sheetName);
  document.head.appendChild(script);
}

function startRefresh() {
  clearInterval(refreshTimer);
  if (CFG.sheetId) {
    fetchSheet();
    refreshTimer = setInterval(fetchSheet, CFG.refresh * 1000);
  }
}

// ───────────────────────────────────────────────
// SEQUENCE BUILDER
// ───────────────────────────────────────────────
function buildSlots() {
  var groups = {}, order = [], seen = {};
  allItems.forEach(function(it) {
    if (it.groupId) {
      if (!groups[it.groupId]) groups[it.groupId] = [];
      groups[it.groupId].push(it);
      if (!seen[it.groupId]) { seen[it.groupId] = 1; order.push({t:'m', id:it.groupId}); }
    } else {
      order.push({t:'s', it:it});
    }
  });
  slots = order.map(function(o) {
    return o.t === 's' ? {t:'s', it:o.it} : {t:'m', ls:groups[o.id]};
  });
}

function buildSequence() {
  sequence = [];
  if (!slots.length) return;
  var PS = CFG.pageSize || 6;
  var SE = 4;
  var pages = [], tot;
  for (var i = 0; i < allItems.length; i += PS) pages.push(allItems.slice(i, i + PS));
  tot = pages.length;
  function addSum() { pages.forEach(function(p,pi) { sequence.push({t:'sum',p:p,pn:pi+1,tot:tot}); }); }
  addSum();
  slots.forEach(function(sl, idx) {
    sequence.push(sl.t==='s' ? {t:'det',it:sl.it} : {t:'mul',ls:sl.ls});
    if (idx < slots.length-1 && (idx+1) % SE === 0) addSum();
  });
}

function rebuildAndRender() {
  mergeItems();
  buildSlots();
  buildSequence();
  renderSlides();
}

// ───────────────────────────────────────────────
// RENDER
// ───────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function detHtml(it) {
  var c = tc(it.loai);
  var ih = it.img ? '<div class="detail-img"><img src="'+it.img+'" onerror="this.parentElement.style.display='none'"></div>' : '';
  return '<div class="tagbar"><div class="type-tag" style="background:'+c+'">'+esc(it.loai||'お知らせ')+'</div>'+(it._local?'<span style="font-size:11px;color:#aaa">ローカル</span>':'')+'<div class="slide-meta">'+esc(it.ngay)+(it.author?'　-　'+esc(it.author):'')+'</div></div>'
    +'<div class="detail-body"><div class="detail-text"><div class="slide-title">'+esc(it.title)+'</div><div class="slide-content">'+esc(it.body)+'</div></div>'+ih+'</div>';
}

function mulHtml(ls) {
  var c = tc(ls[0].loai);
  var tabs  = ls.map(function(l,i){return '<div class="lang-tab'+(i===0?' active':'')+'" data-li="'+i+'">'+esc(l.author)+'</div>';}).join('');
  var pans  = ls.map(function(l,i){return '<div class="lang-panel'+(i===0?' active':'')+'" data-li="'+i+'"><div class="slide-title">'+esc(l.title)+'</div><div class="slide-content">'+esc(l.body)+'</div></div>';}).join('');
  return '<div class="tagbar"><div class="type-tag" style="background:'+c+'">'+esc(ls[0].loai||'お知らせ')+'</div><div class="lang-tabs">'+tabs+'</div><div class="slide-meta">'+esc(ls[0].ngay)+'</div></div>'
    +'<div class="detail-body"><div class="detail-text">'+pans+'</div></div>';
}

function sumHtml(p, pn, tot) {
  var rows = p.map(function(it) {
    var c = tc(it.loai);
    return '<div class="srow" style="border-left-color:'+c+'">'
      +'<span class="s-tag" style="background:'+c+'">'+esc(it.loai||'お知らせ')+'</span>'
      +'<div class="s-cnt"><div class="s-title">'+esc(it.title)+'</div>'+(it.body?'<div class="s-body">'+esc(it.body)+'</div>':'')+'</div>'
      +'<div class="s-meta">'+esc(it.ngay)+(it.author?'<br>'+esc(it.author):'')+'</div></div>';
  }).join('');
  var pg = tot > 1 ? '<span class="pg">('+pn+' / '+tot+'ページ)</span>' : '';
  return '<div class="summary-wrap"><div class="summary-head">📋 お知らせ一覧　全'+allItems.length+'件 '+pg+'</div><div class="summary-list">'+rows+'</div></div>';
}

function slotHtml(sl) {
  if (sl.t === 'sum') return sumHtml(sl.p, sl.pn, sl.tot);
  if (sl.t === 'mul') return mulHtml(sl.ls);
  return detHtml(sl.it);
}

function slotDur(sl) {
  if (sl.t === 'sum') return (CFG.summarySec || 30) * 1000;
  if (sl.t === 'mul') return sl.ls.length * 10 * 1000;
  return (CFG.detailSec || 20) * 1000;
}

function renderSlides() {
  var stage = document.getElementById('stage');
  var dots  = document.getElementById('dots');
  stage.innerHTML = '';
  dots.innerHTML  = '';

  if (!sequence.length) {
    stage.innerHTML = '<div class="empty-msg"><div>現在お知らせはありません</div>'
      +(CFG.sheetId?'':'<div style="font-size:14px;color:#aaa">ロゴを3回クリックして設定を開いてください</div>')+'</div>';
    document.getElementById('footer-info').textContent = '';
    return;
  }

  sequence.forEach(function(sl, i) {
    var s = document.createElement('div');
    s.className = 'slide' + (i === 0 ? ' active' : '');
    s.id = 'sl' + i;
    s.innerHTML = slotHtml(sl);
    stage.appendChild(s);

    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dt' + i;
    dots.appendChild(d);
  });

  document.getElementById('footer-info').textContent = '全 ' + allItems.length + ' 件';
  current = 0;
  startRotation();
}

// ───────────────────────────────────────────────
// ROTATION
// ───────────────────────────────────────────────
function showSlide(i) {
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.dot').forEach(function(d){d.classList.remove('active');});
  var s = document.getElementById('sl'+i), d = document.getElementById('dt'+i);
  if (s) s.classList.add('active');
  if (d) d.classList.add('active');

  clearInterval(langTimer);
  var sl = sequence[i];
  if (sl && sl.t === 'mul') {
    var ls = sl.ls, li = 0;
    langTimer = setInterval(function() {
      var el = document.getElementById('sl'+i); if (!el) return;
      el.querySelectorAll('.lang-tab,.lang-panel').forEach(function(x){x.classList.remove('active');});
      li = (li+1) % ls.length;
      var t = el.querySelector('.lang-tab[data-li="'+li+'"]');
      var p = el.querySelector('.lang-panel[data-li="'+li+'"]');
      if (t) t.classList.add('active');
      if (p) p.classList.add('active');
    }, 10000);
  }
}

function startRotation() {
  clearTimeout(advTimer); clearInterval(progTimer); clearInterval(langTimer);
  if (sequence.length <= 1) { showSlide(0); return; }
  tick();
}

function tick() {
  clearTimeout(advTimer); clearInterval(progTimer);
  showSlide(current);
  var dur = slotDur(sequence[current]);
  var elapsed = 0;
  document.getElementById('pbar').style.transition = 'none';
  document.getElementById('pbar').style.width = '0%';
  requestAnimationFrame(function() {
    document.getElementById('pbar').style.transition = 'width ' + dur + 'ms linear';
    document.getElementById('pbar').style.width = '100%';
  });
  advTimer = setTimeout(function() {
    clearInterval(langTimer);
    current = (current + 1) % sequence.length;
    tick();
  }, dur);
}

// ───────────────────────────────────────────────
// CLOCK
// ───────────────────────────────────────────────
function updateClock() {
  var n = new Date();
  document.getElementById('clock').textContent =
    n.getFullYear() + '/' + (n.getMonth()+1).toString().padStart(2,'0') + '/' + n.getDate().toString().padStart(2,'0')
    + '  ' + n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}
updateClock();
setInterval(updateClock, 15000);

// ───────────────────────────────────────────────
// SETTINGS PANEL
// ───────────────────────────────────────────────
var logoClickCount = 0, logoClickTimer = null;
document.getElementById('logo-img').addEventListener('click', function() {
  logoClickCount++;
  clearTimeout(logoClickTimer);
  logoClickTimer = setTimeout(function() { logoClickCount = 0; }, 600);
  if (logoClickCount >= 3) { logoClickCount = 0; openSettings(); }
});

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'S') { e.preventDefault(); openSettings(); }
});

function openSettings() {
  document.getElementById('cfg-sheet-id').value    = CFG.sheetId || '';
  document.getElementById('cfg-sheet-name').value  = CFG.sheetName || 'シート1';
  document.getElementById('cfg-refresh').value     = CFG.refresh || 30;
  document.getElementById('cfg-detail-sec').value  = CFG.detailSec || 20;
  document.getElementById('cfg-summary-sec').value = CFG.summarySec || 30;
  document.getElementById('cfg-page-size').value   = CFG.pageSize || 6;
  renderLocalList();
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

document.getElementById('settings-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

function saveSheetConfig() {
  CFG.sheetId   = document.getElementById('cfg-sheet-id').value.trim();
  CFG.sheetName = document.getElementById('cfg-sheet-name').value.trim() || 'シート1';
  CFG.refresh   = parseInt(document.getElementById('cfg-refresh').value) || 30;
  saveConfig();
  startRefresh();
  var st = document.getElementById('conn-status');
  st.innerHTML = '<span class="status-dot status-ok"></span>設定を保存しました。接続中...';
  setTimeout(function() { closeSettings(); }, 1000);
}

function testConnection() {
  var id = document.getElementById('cfg-sheet-id').value.trim();
  var nm = document.getElementById('cfg-sheet-name').value.trim() || 'シート1';
  if (!id) { document.getElementById('conn-status').innerHTML = '<span class="status-dot status-err"></span>Sheet IDを入力してください'; return; }
  document.getElementById('conn-status').innerHTML = '接続テスト中...';
  var cbName = 'nb_test_' + Date.now();
  var script  = document.createElement('script');
  var tout    = setTimeout(function() {
    delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script);
    document.getElementById('conn-status').innerHTML = '<span class="status-dot status-err"></span>タイムアウト。Sheet IDとシート名を確認してください';
  }, 8000);
  window[cbName] = function(data) {
    clearTimeout(tout); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script);
    if (data && data.table) {
      var n = (data.table.rows||[]).length;
      document.getElementById('conn-status').innerHTML = '<span class="status-dot status-ok"></span>接続成功！ ' + n + '行のデータを検出';
    } else {
      document.getElementById('conn-status').innerHTML = '<span class="status-dot status-err"></span>接続できましたがデータが見つかりません';
    }
  };
  script.onerror = function() {
    clearTimeout(tout);
    document.getElementById('conn-status').innerHTML = '<span class="status-dot status-err"></span>接続失敗。Sheet IDを確認してください';
  };
  script.src = 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json;handler:'+cbName+'&sheet='+encodeURIComponent(nm);
  document.head.appendChild(script);
}

function clearSheetConfig() {
  CFG.sheetId = ''; saveConfig();
  sheetItems = [];
  document.getElementById('cfg-sheet-id').value = '';
  document.getElementById('src-badge').textContent = '—';
  clearInterval(refreshTimer);
  rebuildAndRender();
  document.getElementById('conn-status').innerHTML = '<span class="status-dot"></span>接続を解除しました';
}

function saveDisplayConfig() {
  CFG.detailSec  = parseInt(document.getElementById('cfg-detail-sec').value) || 20;
  CFG.summarySec = parseInt(document.getElementById('cfg-summary-sec').value) || 30;
  CFG.pageSize   = parseInt(document.getElementById('cfg-page-size').value) || 6;
  saveConfig();
  rebuildAndRender();
  closeSettings();
}

// ───────────────────────────────────────────────
// LOCAL ITEMS
// ───────────────────────────────────────────────
function addLocalItem() {
  var title = document.getElementById('new-title').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  var today = new Date();
  LOCAL_ITEMS.push({
    loai:     document.getElementById('new-loai').value,
    title:    title,
    body:     document.getElementById('new-body').value.trim(),
    author:   document.getElementById('new-author').value.trim(),
    priority: parseInt(document.getElementById('new-priority').value) || 2,
    img:      '',
    groupId:  '',
    ngay:     today.getFullYear()+'/'+(today.getMonth()+1).toString().padStart(2,'0')+'/'+today.getDate().toString().padStart(2,'0'),
  });
  saveLocal();
  document.getElementById('new-title').value = '';
  document.getElementById('new-body').value  = '';
  renderLocalList();
  rebuildAndRender();
}

function deleteLocal(idx) {
  LOCAL_ITEMS.splice(idx, 1);
  saveLocal();
  renderLocalList();
  rebuildAndRender();
}

function clearAllLocal() {
  if (!confirm('全てのローカルお知らせを削除しますか？')) return;
  LOCAL_ITEMS = [];
  saveLocal();
  renderLocalList();
  rebuildAndRender();
}

function renderLocalList() {
  var list = document.getElementById('local-list');
  document.getElementById('local-count').textContent = LOCAL_ITEMS.length;
  if (!LOCAL_ITEMS.length) { list.innerHTML = '<div style="font-size:13px;color:#aaa;padding:8px">なし</div>'; return; }
  list.innerHTML = LOCAL_ITEMS.map(function(it, i) {
    return '<div class="local-item">'
      +'<div class="li-text"><div class="li-title">'+esc(it.title)+'</div><div class="li-sub">'+esc(it.loai)+'　|　'+esc(it.author)+'　|　優先度'+it.priority+'</div></div>'
      +'<button class="li-del" onclick="deleteLocal('+i+')" title="削除">✕</button></div>';
  }).join('');
}

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
loadConfig();
rebuildAndRender();
startRefresh();
if (!CFG.sheetId && !LOCAL_ITEMS.length) {
  setTimeout(openSettings, 800);
}
</script>
</body>
</html>
