<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>社内お知らせボード - 横浜工場</title>
<style>
  :root{
    --navy:#1F2D50; --grey:#566573; --red:#C0392B; --orange:#E67E22;
    --blue:#2E86C1; --green:#27AE60; --darktext:#1B1B1B; --light:#F4F6F7;
    --purple:#8E44AD; --teal:#17A589; --clover:#00897B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;
    font-family:"Hiragino Sans","Meiryo","Noto Sans JP",Arial,sans-serif;background:#0d1224;}
  #app{height:100vh;width:100vw;display:flex;flex-direction:column;}
  header{background:var(--navy);color:#fff;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  header h1{margin:0;font-size:clamp(28px,4vw,46px);font-weight:800;letter-spacing:1px;}
  header .logo{height:54px;width:auto;object-fit:contain;border-radius:6px;margin-right:18px;display:none;}
  header .logo.show{display:block;}
  header .left{display:flex;align-items:center;gap:0;}
  header .clock{font-size:clamp(16px,2vw,24px);opacity:.9;text-align:right;}
  main{flex:1;position:relative;background:#fff;overflow:hidden;}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transition:opacity .6s ease;}
  .slide.active{opacity:1;}
  .detail-wrap{flex:1;display:flex;overflow:hidden;}
  .detail-text{flex:1;display:flex;flex-direction:column;min-width:0;}
  .detail-img{width:38%;flex-shrink:0;overflow:hidden;background:#eee;display:flex;align-items:center;justify-content:center;}
  .detail-img img{width:100%;height:100%;object-fit:cover;}
  .tagbar{display:flex;align-items:center;padding:30px 50px 10px;gap:20px;}
  .tag{color:#fff;font-weight:800;font-size:clamp(20px,2.6vw,32px);padding:10px 28px;border-radius:10px;letter-spacing:2px;}
  .meta{font-size:clamp(16px,1.6vw,22px);color:var(--grey);font-style:italic;margin-left:auto;}
  .title{font-size:clamp(34px,5vw,64px);font-weight:800;color:var(--darktext);padding:10px 50px 20px;line-height:1.25;}
  .body{font-size:clamp(24px,3vw,38px);color:var(--darktext);padding:0 50px;line-height:1.5;flex:1;overflow:auto;}
  footer{flex-shrink:0;background:var(--light);padding:14px 30px;display:flex;align-items:center;gap:20px;}
  .progress-wrap{flex:1;height:10px;background:#dfe3e6;border-radius:6px;overflow:hidden;}
  .progress-bar{height:100%;width:0%;background:var(--navy);}
  .dots{display:flex;gap:10px;}
  .dot{width:14px;height:14px;border-radius:50%;background:#c8ccd0;}
  .dot.on{background:var(--navy);}
  .footnote{font-size:14px;color:var(--grey);}
  .empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;color:var(--grey);}
  /* ── 多言語タブ ── */
  .lang-tabs{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;}
  .lang-tab{padding:6px 18px;border-radius:20px;font-size:clamp(13px,1.2vw,17px);font-weight:700;background:rgba(255,255,255,.2);color:#fff;cursor:default;transition:background .3s;}
  .lang-tab.active{background:rgba(255,255,255,.9);color:var(--darktext);}
  .multi-text{position:relative;}
  .lang-panel{display:none;flex-direction:column;}
  .lang-panel.active{display:flex;}
  .summary-wrap{padding:30px 50px;height:100%;display:flex;flex-direction:column;}
  .summary-heading{font-size:clamp(26px,3vw,40px);font-weight:800;color:var(--navy);margin-bottom:20px;}
  .summary-list{flex:1;display:flex;flex-direction:column;gap:10px;overflow:auto;}
  .summary-row{display:flex;align-items:flex-start;gap:20px;border-radius:10px;padding:12px 22px;border-left:10px solid var(--grey);}
  .summary-row:nth-child(odd){background:var(--light);}
  .summary-row:nth-child(even){background:#ffffff;}
  .summary-row .s-tag{flex-shrink:0;color:#fff;font-weight:800;font-size:clamp(12px,1vw,15px);padding:6px 12px;border-radius:6px;width:120px;text-align:center;margin-top:3px;}
  .summary-row .s-content{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
  .summary-row .s-title{font-size:clamp(16px,1.8vw,24px);font-weight:800;color:var(--darktext);line-height:1.3;}
  .summary-row .s-body{font-size:clamp(13px,1.3vw,18px);color:var(--grey);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
  .summary-row .s-meta{flex-shrink:0;font-size:clamp(12px,1.1vw,16px);color:var(--grey);font-style:italic;white-space:nowrap;margin-top:3px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="left">
      <img class="logo" id="logoImg" src="" alt="logo">
      <h1>📢 社内お知らせボード - 横浜工場</h1>
    </div>
    <div class="clock" id="clock"></div>
  </header>
  <main id="main">
    <div class="empty" id="loading">読み込み中...</div>
  </main>
  <footer>
    <div class="dots" id="dots"></div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="footnote" id="countInfo"></div>
  </footer>
</div>

function fmtDate(d){
  if(!(d instanceof Date) || isNaN(d)) return "";
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}
function parseGvizDate(v){
  if(typeof v !== "string") return null;
  const m = v.match(/Date\((\d+),(\d+),(\d+)/);
  return m ? new Date(+m[1], +m[2], +m[3]) : null;
}
function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function gdriveDirect(url){
  if(!url) return "";
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : url;
}

/* ====== データ取得 ====== */
function fetchData(){
  const logoEl = document.getElementById("logoImg");
  if(LOGO_URL){ logoEl.src = LOGO_URL; logoEl.classList.add("show"); }

  // JSONP方式 (CORSを回避)
  const cbName = "gviz_" + Date.now();
  const script = document.createElement("script");

  const timeoutId = setTimeout(() => {
    cleanup();
    if(!initialized){
      document.getElementById("main").innerHTML =
        `<div class="empty" style="flex-direction:column;gap:16px">
          <div>⚠️ データを読み込めません</div>
          <div style="font-size:18px;color:#888">File → 共有 → ウェブに公開 を確認してください</div>
        </div>`;
    }
  }, 8000);

  function cleanup(){
    clearTimeout(timeoutId);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
  }

  window[cbName] = function(data){
    cleanup();
    try{
      const rows  = (data.table && data.table.rows) || [];
      const today = new Date(); today.setHours(0,0,0,0);

      const parsed = rows.map(r=>{
        const c   = r.c||[];
        const get = i => (c[i]&&c[i].v!=null) ? c[i].v : "";
        const ngay   = parseGvizDate(get(1)) || new Date(get(1));
        const hethan = get(2) ? (parseGvizDate(get(2)) || new Date(get(2))) : null;
        return {
          id:       get(0),
          ngay,     hethan,
          loai:     String(get(3)||"").trim(),
          title:    String(get(4)||"").trim(),
          body:     String(get(5)||"").trim(),
          author:   String(get(6)||"").trim(),
          status:   String(get(7)||"").trim(),
          priority: parseInt(get(8))||99,
          imgUrl:   gdriveDirect(String(get(10)||"").trim()),
          groupId:  String(get(11)||"").trim()
        };
      });

      items = parsed.filter(x =>
        x.status === "表示" && x.title !== ""
        && (!x.hethan || isNaN(x.hethan) || x.hethan >= today)
      ).sort((a,b) => a.priority - b.priority || b.ngay - a.ngay);

      buildSlotItems();
      buildSequence();

      if(!initialized){ initialized = true; renderSlides(); }
      else { refreshSlidesContent(); }
    }catch(err){
      console.error("parse error:", err);
    }
  };

  script.onerror = () => { cleanup(); console.error("script load error"); };
  script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;handler:${cbName}&sheet=${encodeURIComponent(SHEET_NAME)}`;
  document.head.appendChild(script);
}

/* ====== グループ化 ====== */
function buildSlotItems(){
  const groups = {};
  const order  = [];
  const seen   = {};

  items.forEach(it => {
    if(it.groupId){
      if(!groups[it.groupId]){ groups[it.groupId] = []; order.push({type:"multi", id:it.groupId}); }
      groups[it.groupId].push(it);
    } else {
      order.push({type:"single", item:it});
    }
  });

  // dedup order (same groupId may appear multiple times)
  const deduped = [];
  const seen2 = new Set();
  order.forEach(o => {
    const key = o.type === "single" ? "s_"+o.item.id : "g_"+o.id;
    if(!seen2.has(key)){ seen2.add(key); deduped.push(o); }
  });

  slotItems = deduped.map(o => {
    if(o.type === "single") return {type:"single", item:o.item};
    const langs = groups[o.id];
    const rep   = langs[0];
    return {type:"multi", langs, priority:rep.priority, ngay:rep.ngay};
  });
}

/* ====== シーケンス構築 ====== */
function buildSequence(){
  sequence = [];
  if(slotItems.length === 0) return;

  // summary pages from items
  const pages = [];
  for(let i=0; i<items.length; i+=SUMMARY_PAGE_SIZE)
    pages.push(items.slice(i, i+SUMMARY_PAGE_SIZE));
  const totalPages = pages.length;

  function pushSummary(){
    pages.forEach((page,pi) =>
      sequence.push({type:"summary", page, pageNum:pi+1, totalPages}));
  }

  if(SHOW_SUMMARY_EVERY > 0) pushSummary();
  slotItems.forEach((slot, idx) => {
    sequence.push(slot.type === "single"
      ? {type:"detail",  item: slot.item}
      : {type:"multi",   langs: slot.langs});
    const isLast = idx === slotItems.length - 1;
    if(SHOW_SUMMARY_EVERY > 0 && !isLast && (idx+1) % SHOW_SUMMARY_EVERY === 0)
      pushSummary();
  });
}

/* ====== 表示時間 ====== */
function durationFor(slot){
  if(slot.type === "summary") return SUMMARY_SECONDS * 1000;
  if(slot.type === "multi")   return slot.langs.length * LANG_SWITCH_SECONDS * 1000;
  return DETAIL_SECONDS * 1000;
}

/* ====== スライドレンダリング ====== */
function renderSlides(){
  const main  = document.getElementById("main");
  const dots  = document.getElementById("dots");
  main.innerHTML = "";
  dots.innerHTML = "";

  if(sequence.length === 0){
    main.innerHTML = `<div class="empty">現在お知らせはありません</div>`;
    document.getElementById("countInfo").textContent = "";
    return;
  }

  sequence.forEach((slot, idx) => {
    const slide = document.createElement("div");
    slide.className = "slide" + (idx===0 ? " active" : "");
    slide.id = "slide-"+idx;
    slide.innerHTML = buildSlideHtml(slot);
    main.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (idx===0 ? " on" : "");
    dot.id = "dot-"+idx;
    dots.appendChild(dot);
  });

  document.getElementById("countInfo").textContent = `全 ${items.length} 件`;
  current = 0;
  restartRotation();
}

function refreshSlidesContent(){
  if(sequence.length === 0) return;
  if(current >= sequence.length) current = 0;
  sequence.forEach((slot, idx) => {
    let slide = document.getElementById("slide-"+idx);
    if(!slide){
      slide = document.createElement("div");
      slide.className = "slide";
      slide.id = "slide-"+idx;
      document.getElementById("main").appendChild(slide);
      const dot = document.createElement("div");
      dot.className = "dot"; dot.id = "dot-"+idx;
      document.getElementById("dots").appendChild(dot);
    }
    slide.innerHTML = buildSlideHtml(slot);
  });
  let i = sequence.length;
  while(document.getElementById("slide-"+i)){
    document.getElementById("slide-"+i).remove();
    const d = document.getElementById("dot-"+i); if(d) d.remove(); i++;
  }
  document.getElementById("countInfo").textContent = `全 ${items.length} 件`;
  showSlide(current);
}

/* ====== スライドHTML生成 ====== */
function buildSlideHtml(slot){
  if(slot.type === "summary") return buildSummaryHtml(slot.page, slot.pageNum, slot.totalPages);
  if(slot.type === "multi")   return buildMultiHtml(slot.langs);
  return buildDetailHtml(slot.item);
}

function buildDetailHtml(it){
  const color = TYPE_COLOR[it.loai] || "var(--grey)";
  const imgHtml = it.imgUrl
    ? `<div class="detail-img"><img src="${it.imgUrl}" alt="" onerror="this.parentElement.style.display='none'"></div>` : "";
  return `
    <div class="tagbar">
      <div class="tag" style="background:${color}">${escapeHtml(it.loai)||"お知らせ"}</div>
      <div class="meta">${fmtDate(it.ngay)}　-　${escapeHtml(it.author)}</div>
    </div>
    <div class="detail-wrap">
      <div class="detail-text">
        <div class="title">${escapeHtml(it.title)}</div>
        <div class="body">${escapeHtml(it.body)}</div>
      </div>
      ${imgHtml}
    </div>`;
}

function buildMultiHtml(langs){
  const first = langs[0];
  const color = TYPE_COLOR[first.loai] || "var(--grey)";
  const tabs = langs.map((l,i) =>
    `<div class="lang-tab${i===0?" active":""}" data-idx="${i}">${escapeHtml(l.author)}</div>`
  ).join("");
  const panels = langs.map((l,i) => `
    <div class="lang-panel${i===0?" active":""}" data-idx="${i}">
      <div class="title">${escapeHtml(l.title)}</div>
      <div class="body">${escapeHtml(l.body)}</div>
    </div>`).join("");
  return `
    <div class="tagbar">
      <div class="tag" style="background:${color}">${escapeHtml(first.loai)||"お知らせ"}</div>
      <div class="lang-tabs">${tabs}</div>
      <div class="meta">${fmtDate(first.ngay)}</div>
    </div>
    <div class="detail-wrap">
      <div class="detail-text multi-text">${panels}</div>
    </div>`;
}

function buildSummaryHtml(page, pageNum, totalPages){
  const rows = page.map(it => {
    const color = TYPE_COLOR[it.loai] || "var(--grey)";
    const body  = it.body ? `<div class="s-body">${escapeHtml(it.body)}</div>` : "";
    return `
      <div class="summary-row" style="border-left-color:${color}">
        <span class="s-tag" style="background:${color}">${escapeHtml(it.loai)||"お知らせ"}</span>
        <div class="s-content">
          <div class="s-title">${escapeHtml(it.title)}</div>
          ${body}
        </div>
        <div class="s-meta">${fmtDate(it.ngay)}　-　${escapeHtml(it.author)}</div>
      </div>`;
  }).join("");
  const pageLabel = totalPages > 1
    ? `　<span style="font-size:0.6em;font-weight:400;color:var(--grey)">(${pageNum} / ${totalPages}ページ)</span>` : "";
  return `
    <div class="summary-wrap">
      <div class="summary-heading">📋 お知らせ一覧（全 ${items.length} 件）${pageLabel}</div>
      <div class="summary-list">${rows}</div>
    </div>`;
}

/* ====== スライド切り替え ====== */
function showSlide(i){
  document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("on"));
  const s = document.getElementById("slide-"+i);
  const d = document.getElementById("dot-"+i);
  if(s) s.classList.add("active");
  if(d) d.classList.add("on");

  // 多言語スライドの場合は内部言語ローテーションを開始
  clearInterval(langTimer);
  if(sequence[i] && sequence[i].type === "multi"){
    const langs = sequence[i].langs;
    let li = 0;
    langTimer = setInterval(() => {
      const slide = document.getElementById("slide-"+i);
      if(!slide) return;
      slide.querySelectorAll(".lang-tab,.lang-panel").forEach(el=>el.classList.remove("active"));
      li = (li+1) % langs.length;
      const tab = slide.querySelector(`.lang-tab[data-idx="${li}"]`);
      const panel = slide.querySelector(`.lang-panel[data-idx="${li}"]`);
      if(tab) tab.classList.add("active");
      if(panel) panel.classList.add("active");
    }, LANG_SWITCH_SECONDS * 1000);
  }
}

/* ====== ローテーション ====== */
function restartRotation(){
  clearTimeout(advanceTimer); clearInterval(progressTimer); clearInterval(langTimer);
  if(sequence.length <= 1) return;
  scheduleSlide();
}
function scheduleSlide(){
  clearTimeout(advanceTimer); clearInterval(progressTimer);
  const dur = durationFor(sequence[current]);
  let elapsed = 0;
  document.getElementById("progressBar").style.width = "0%";
  progressTimer = setInterval(() => {
    elapsed += 100;
    document.getElementById("progressBar").style.width = Math.min(100,(elapsed/dur)*100)+"%";
  }, 100);
  advanceTimer = setTimeout(() => {
    clearInterval(langTimer);
    current = (current+1) % sequence.length;
    showSlide(current);
    scheduleSlide();
  }, dur);
}

/* ====== 時計 ====== */
function tickClock(){
  const n = new Date();
  document.getElementById("clock").textContent =
    `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,"0")}/${String(n.getDate()).padStart(2,"0")}  ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}

tickClock();
setInterval(tickClock, 30000);
fetchData();
setInterval(fetchData, DATA_REFRESH_MS);

</script>
